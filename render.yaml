# Render Blueprint — deploys the BACKEND (Django, Docker) + managed PostgreSQL.
# The FRONTEND is deployed separately on Vercel (see docs/DEPLOYMENT.md).
# Import via Render dashboard -> New -> Blueprint.
#
# After the first deploy:
#   1. Note the backend URL (e.g. https://ahoum-backend.onrender.com)
#   2. Deploy the frontend on Vercel, note its URL
#   3. Set FRONTEND_URL + CORS_ALLOWED_ORIGINS here to the Vercel URL
#   4. Set the 4 OAuth secrets (sync:false) in the Render dashboard
#   5. Register OAuth callback URLs (see docs/DEPLOYMENT.md)

databases:
  - name: ahoum-db
    databaseName: ahoum
    user: ahoum
    plan: free

services:
  - type: web
    name: ahoum-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: POSTGRES_DB
        fromDatabase: { name: ahoum-db, property: database }
      - key: POSTGRES_USER
        fromDatabase: { name: ahoum-db, property: user }
      - key: POSTGRES_PASSWORD
        fromDatabase: { name: ahoum-db, property: password }
      - key: POSTGRES_HOST
        fromDatabase: { name: ahoum-db, property: host }
      - key: POSTGRES_PORT
        fromDatabase: { name: ahoum-db, property: port }
      - key: BACKEND_BASE_URL
        value: https://ahoum-backend.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
